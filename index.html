<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>캐시쉐이크 · phantomz inc</title>
    <!--
      카카오 공유 "앱에서 받기" 등이 webUrl 을 도메인 루트로 여는 경우가 있어,
      루트 진입을 스토어 분기 랜딩(app.html)으로 보낸다. 초대코드 등 쿼리스트링/해시는
      그대로 넘겨 app.html 이 invite 를 처리하도록 한다.
    -->
    <script>
      location.replace("/app.html" + location.search + location.hash);
    </script>
    <meta http-equiv="refresh" content="0; url=/app.html" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #f8f9fa;
        color: #111827;
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
      }
      main {
        text-align: center;
        padding: 24px;
      }
      h1 {
        color: #ff6a00;
        font-size: 28px;
        margin: 0 0 8px;
      }
      a {
        color: #ff6a00;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>캐시쉐이크</h1>
      <p><a href="/app.html">앱 받기로 이동하기</a></p>
    </main>
  </body>
</html>
